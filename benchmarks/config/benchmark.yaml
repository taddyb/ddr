# Benchmark configuration for comparing DDR vs DiffRoute
# Extends standard DDR config format with DiffRoute options

defaults:
  - _self_
  - hydra: settings

# Standard DDR config (same as example_config.yaml)
mode: testing
geodataset: merit
name: benchmarks-v${oc.env:BENCHMARKS_VERSION,dev}-${geodataset}
device: 0

data_sources:
  attributes: /home/tbindas/projects/ddr/data/merit_global_attributes_v2.nc
  geospatial_fabric_gpkg: /home/tbindas/projects/ddr/data/merit/riv_pfaf_7_MERIT_Hydro_v07_Basins_v01_bugfix1.shp
  conus_adjacency: /home/tbindas/projects/ddr/data/merit_conus_adjacency.zarr
  gages_adjacency: /home/tbindas/projects/ddr/data/merit_gages_conus_adjacency.zarr
  statistics: /home/tbindas/projects/ddr/data/statistics
  streamflow: /home/tbindas/projects/ddr/data/merit_dhbv2_UH_retrospective
  observations: /mnt/ssd1/data/icechunk/usgs_daily_observations
  gages: /home/tbindas/projects/ddr/references/gage_info/gages_3000.csv

params:
  save_path: ./
  use_reservoir: false

experiment:
  batch_size: 182
  start_time: 1995/10/01
  end_time: 2010/09/30
  warmup: 3
  checkpoint: /home/tbindas/projects/ddr/output/ddr-v0.6.2.dev9+g36af06c90.d20260301-merit-training/2026-03-01_19-30-41/saved_models/_ddr-v0.6.2.dev9+g36af06c90.d20260301-merit-training_epoch_5_mb_43.pt
  log_tensorboard: false

kan:
  hidden_size: 21
  input_var_names:
    - SoilGrids1km_clay
    - aridity
    - meanelevation
    - meanP
    - NDVI
    - meanslope
    - log10_uparea
    - SoilGrids1km_sand
    - ETPOT_Hargr
    - Porosity
  num_hidden_layers: 2
  learnable_parameters:
    - n
    - q_spatial
    - top_width
    - side_slope
  grid: 50
  k: 2
  use_graph_context: false
  use_node_processor: false

# To enable leakance (groundwater-surface water exchange):
# params:
#   use_leakance: true
# kan:
#   learnable_parameters: [n, q_spatial, top_width, side_slope, K_D, d_gw]
#   off_parameters: [K_D, d_gw]

# === DiffRoute-specific configuration ===
diffroute:
  # Enable/disable DiffRoute comparison
  enabled:


  # Impulse Response Function model
  # Options: muskingum, linear_storage, nash_cascade, pure_lag, hayami
  irf_fn: muskingum

  # Maximum delay for LTI router (number of timesteps)
  max_delay: 100

  # Timestep in days (3600/86400 = 1 hour)
  dt: 0.0416667

  # Muskingum k parameter (wave travel time through reach) in days
  # Must be in same units as dt. For stability: k >= dt / (2*(1-x))
  # k = reach_length / wave_celerity
  # 0.1042 days = 9000s = 2.5 hours (RAPID default)
  k: 0.1042

  # Muskingum x parameter (weighting factor, typically 0-0.5)
  # x=0 gives pure reservoir behavior, x=0.5 gives pure translation
  x: 0.3

# === Optional baseline comparison ===
summed_q_prime: /home/tbindas/projects/ddr/output/ddr-v0.3.2.dev10+g2ffbf380e.d20260207-merit-q_prime/2026-02-07_19-50-49/summed_q_prime.zarr
